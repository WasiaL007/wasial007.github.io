<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Wasi Al | Personal Blog & Portfolio</title>

  <style>
    * {
      box-sizing: border-box;
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      line-height: 1.6;
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 8%;
      background: rgba(15, 23, 42, 0.95);
      border-bottom: 1px solid #263449;
    }

    .logo {
      font-size: 22px;
      font-weight: bold;
      color: #60a5fa;
    }

    nav a {
      margin-left: 18px;
      color: #cbd5e1;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      color: white;
    }

    .hero {
      min-height: 85vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 70px 20px;
      text-align: center;
    }

    .hero-content {
      max-width: 850px;
    }

    .hero h1 {
      margin: 0 0 12px;
      font-size: clamp(42px, 9vw, 72px);
      line-height: 1.15;
    }

    .hero p {
      margin: 0 auto;
      max-width: 700px;
      font-size: clamp(18px, 4vw, 24px);
      color: #cbd5e1;
    }

    .button {
      display: inline-block;
      margin-top: 30px;
      padding: 13px 28px;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      text-decoration: none;
      font-weight: bold;
      transition: 0.25s;
    }

    .button:hover {
      background: #1d4ed8;
      transform: translateY(-2px);
    }

    section {
      padding: 85px 8%;
    }

    .section-title {
      margin: 0 0 25px;
      text-align: center;
      font-size: 36px;
    }

    .about-card {
      max-width: 850px;
      margin: auto;
      padding: 32px;
      border: 1px solid #334155;
      border-radius: 18px;
      background: #172033;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
    }

    .about-card p {
      margin: 0 0 16px;
      font-size: 18px;
      color: #cbd5e1;
    }

    .about-card strong {
      color: #60a5fa;
    }

    footer {
      padding: 28px 20px;
      text-align: center;
      color: #94a3b8;
      border-top: 1px solid #263449;
    }

    @media (max-width: 650px) {
      nav {
        padding: 14px 20px;
      }

      nav a {
        margin-left: 10px;
        font-size: 14px;
      }

      section {
        padding: 65px 20px;
      }

      .about-card {
        padding: 24px;
      }
    }
  </style>
</head>

<body>

  <nav>
    <div class="logo">Wasi Al</div>

    <div>
      <a href="#home">Home</a>
      <a href="#about">About</a>
    </div>
  </nav>

  <main>
    <section class="hero" id="home">
      <div class="hero-content">
        <h1>👋 Hi, I'm Wasi Al</h1>

        <p>
          Welcome to my personal blog and portfolio.
          Here I share my projects, ideas and technology journey.
        </p>

          class="button"
          href="https://github.com/WasiaL007"
          target="_blank"
          rel
